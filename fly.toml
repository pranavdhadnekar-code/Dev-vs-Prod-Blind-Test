# Fly.io — free-tier friendly deploy with persistent vote storage.
# See README "Deploy for a distributed team" or run: fly launch

app = "voice-arena"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/benchmark_data.db"

[mounts]
  source = "voice_arena_data"
  destination = "/data"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
